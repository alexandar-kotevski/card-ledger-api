services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: cardledger
      POSTGRES_USER: cardledger
      POSTGRES_PASSWORD: cardledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardledger -d cardledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=cardledger;Username=cardledger;Password=cardledger"
      TreasurySync__Enabled: "true"
    depends_on:
      postgres:
        condition: service_healthy
